<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tone AI Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>

<body class="bg-gradient-to-br from-blue-50 via-slate-50 to-indigo-50 min-h-screen p-4 md:p-8 font-sans text-slate-800 flex justify-center items-start">

    <div class="max-w-3xl w-full bg-white rounded-2xl shadow-xl shadow-blue-900/5 border border-slate-100 overflow-hidden mt-4 md:mt-10">
        
        <!-- Header -->
        <div class="bg-gradient-to-r from-blue-600 to-indigo-600 p-6 text-center">
            <h2 class="text-2xl font-bold text-white flex items-center justify-center gap-3">
                <i class="fa-solid fa-wand-magic-sparkles text-blue-200"></i>
                Tone AI Assistant
            </h2>
            <p class="text-blue-100 text-sm mt-2 opacity-90">Perfect your message with AI</p>
        </div>

        <div class="p-6 md:p-8 space-y-6">
            <!-- Input Area -->
            <div class="relative">
                <textarea id="inputText" 
                    class="w-full h-36 p-4 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all resize-none text-slate-700 placeholder-slate-400 shadow-inner text-base"
                    placeholder="Type or paste your text here to get started..."></textarea>
            </div>

            <!-- Controls -->
            <div class="flex flex-col sm:flex-row gap-4 justify-between items-center bg-slate-50 p-4 rounded-xl border border-slate-100">
                <div class="w-full sm:w-1/3">
                    <label class="block text-xs font-semibold tracking-wider text-slate-500 uppercase mb-2">Select Model</label>
                    <select id="modelSelect" class="w-full p-2.5 bg-white border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm text-slate-700 shadow-sm cursor-pointer hover:border-blue-300 transition-colors">
                        <!-- Gemini Removed As Requested -->
                        <option value="ollama">🟢 Ollama (Local - Free)</option>
                        <option value="openrouter">🔵 OpenRouter (Fast - Cloud)</option>
                    </select>
                </div>

                <div class="flex flex-col sm:flex-row gap-3 w-full sm:w-auto mt-2 sm:mt-0 items-end sm:items-center">
                    <button id="speakBtn" onclick="startVoice()" class="w-full sm:w-auto px-5 py-2.5 bg-white border-2 border-slate-200 text-slate-600 hover:text-blue-600 hover:border-blue-200 hover:bg-blue-50 rounded-lg font-medium transition-all shadow-sm flex items-center justify-center gap-2">
                        <i class="fa-solid fa-microphone"></i> Speak
                    </button>
                    <button id="improveBtn" onclick="sendText()" class="w-full sm:w-auto px-6 py-2.5 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-medium transition-all shadow-md shadow-blue-600/20 flex items-center justify-center gap-2 transform active:scale-95">
                        <i class="fa-solid fa-bolt"></i> Improve Text
                    </button>
                </div>
            </div>

            <!-- Status Indicator -->
            <div id="status" class="text-sm font-medium text-center hidden py-2 rounded-lg"></div>

            <!-- Output Area -->
            <div id="result" class="hidden space-y-4 pt-4 border-t border-slate-100">
                <h3 class="text-lg font-semibold text-slate-800 mb-4 px-1">AI Suggestions</h3>
                
                <!-- Corrected Block -->
                <div class="group relative bg-green-50 border border-green-100 p-5 rounded-xl transition-all hover:shadow-md">
                    <button onclick="copyText('corrected')" class="absolute top-4 right-4 text-green-600 opacity-0 group-hover:opacity-100 transition-opacity hover:bg-green-100 p-2 rounded-md" title="Copy text">
                        <i class="fa-regular fa-copy"></i>
                    </button>
                    <div class="flex items-center gap-2 mb-2">
                        <i class="fa-solid fa-check-double text-green-600"></i>
                        <b class="text-sm uppercase tracking-wider text-green-700">Corrected</b>
                    </div>
                    <span id="corrected" class="text-green-900 block mt-1 leading-relaxed"></span>
                </div>

                <!-- Mistakes Block -->
                <div class="group relative bg-red-50 border border-red-100 p-5 rounded-xl transition-all hover:shadow-md">
                    <div class="flex items-center gap-2 mb-2">
                        <i class="fa-solid fa-triangle-exclamation text-red-500"></i>
                        <b class="text-sm uppercase tracking-wider text-red-600">Mistakes Identified</b>
                    </div>
                    <span id="mistakes" class="text-red-800 block mt-1 leading-relaxed text-sm"></span>
                </div>

                <!-- Variations Grid -->
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mt-2">
                    <!-- Formal -->
                    <div class="group relative bg-slate-50 border border-slate-200 p-4 rounded-xl transition-all hover:border-slate-300 hover:shadow-sm">
                        <button onclick="copyText('formal')" class="absolute top-3 right-3 text-slate-400 hover:text-slate-700 opacity-0 group-hover:opacity-100 transition-opacity"><i class="fa-regular fa-copy"></i></button>
                        <b class="text-xs uppercase tracking-wider text-slate-500 flex items-center gap-1.5 mb-2"><i class="fa-solid fa-briefcase"></i> Formal</b>
                        <span id="formal" class="text-slate-700 text-sm block"></span>
                    </div>

                    <!-- Polite -->
                    <div class="group relative bg-indigo-50 border border-indigo-100 p-4 rounded-xl transition-all hover:border-indigo-200 hover:shadow-sm">
                        <button onclick="copyText('polite')" class="absolute top-3 right-3 text-indigo-400 hover:text-indigo-700 opacity-0 group-hover:opacity-100 transition-opacity"><i class="fa-regular fa-copy"></i></button>
                        <b class="text-xs uppercase tracking-wider text-indigo-500 flex items-center gap-1.5 mb-2"><i class="fa-solid fa-handshake"></i> Polite</b>
                        <span id="polite" class="text-indigo-900 text-sm block"></span>
                    </div>

                    <!-- Friendly -->
                    <div class="group relative bg-orange-50 border border-orange-100 p-4 rounded-xl transition-all hover:border-orange-200 hover:shadow-sm">
                        <button onclick="copyText('friendly')" class="absolute top-3 right-3 text-orange-400 hover:text-orange-700 opacity-0 group-hover:opacity-100 transition-opacity"><i class="fa-regular fa-copy"></i></button>
                        <b class="text-xs uppercase tracking-wider text-orange-500 flex items-center gap-1.5 mb-2"><i class="fa-regular fa-face-smile"></i> Friendly</b>
                        <span id="friendly" class="text-orange-900 text-sm block"></span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>

</body>

</html>
